<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-50">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI News Reader & Classifier</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Custom Styling Tweaks -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .tab-active { border-bottom: 2px solid #2563eb; color: #2563eb; font-weight: 600; }
  </style>
</head>
<body class="h-full flex flex-col text-slate-800 antialiased">

  <!-- Header -->
  <header class="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="p-2 bg-blue-600 text-white rounded-lg shadow-sm">
          <i data-lucide="newspaper" class="w-6 h-6"></i>
        </div>
        <div>
          <h1 class="text-lg font-bold text-slate-900 leading-tight">News Reader AI</h1>
          <p class="text-xs text-slate-500">SVM News Article Categorizer</p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium bg-emerald-50 text-emerald-700 border border-emerald-200">
          <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> Vercel API Ready
        </span>
      </div>
    </div>
  </header>

  <!-- Main Content Area -->
  <main class="flex-1 max-w-5xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
    
    <!-- Tab Navigation -->
    <div class="flex border-b border-slate-200 mb-8 bg-white rounded-xl p-1 shadow-sm border">
      <button id="tabTextBtn" onclick="switchTab('text')" class="flex-1 flex items-center justify-center gap-2 py-3 px-4 text-sm font-medium text-blue-600 tab-active rounded-lg transition-all duration-150">
        <i data-lucide="file-text" class="w-4 h-4"></i> Single Text Classifier
      </button>
      <button id="tabFeedBtn" onclick="switchTab('feed')" class="flex-1 flex items-center justify-center gap-2 py-3 px-4 text-sm font-medium text-slate-500 hover:text-slate-700 rounded-lg transition-all duration-150">
        <i data-lucide="rss" class="w-4 h-4"></i> Live RSS Feed Analyzer
      </button>
    </div>

    <!-- TAB 1: Text Classifier -->
    <section id="tabText" class="space-y-6">
      <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
        <label for="newsText" class="block text-sm font-semibold text-slate-700 mb-2 flex items-center gap-2">
          <i data-lucide="pen-tool" class="w-4 h-4 text-slate-400"></i> Paste Article or Headline
        </label>
        <textarea id="newsText" rows="5" class="w-full p-4 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-slate-900 placeholder-slate-400 text-sm transition" placeholder="Paste news article content, headines, or a brief snippet to predict its category..."></textarea>
        
        <div class="mt-4 flex justify-between items-center">
          <button onclick="clearText()" class="text-xs text-slate-500 hover:text-slate-700 flex items-center gap-1 font-medium">
            <i data-lucide="rotate-ccw" class="w-3.5 h-3.5"></i> Clear Text
          </button>
          <button onclick="predictText()" id="btnClassify" class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-5 py-2.5 rounded-lg text-sm flex items-center gap-2 shadow-sm transition active:scale-95">
            <i data-lucide="sparkles" class="w-4 h-4"></i> Classify Category
          </button>
        </div>
      </div>

      <!-- Result Card -->
      <div id="textResultCard" class="hidden bg-white rounded-xl shadow-sm border border-slate-200 p-6 transition-all duration-300">
        <h3 class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-3">Classification Output</h3>
        <div class="flex items-center justify-between bg-slate-50 rounded-lg p-4 border border-slate-100">
          <span class="text-sm font-medium text-slate-600">Predicted Category:</span>
          <span id="textBadge" class="px-3.5 py-1.5 rounded-full text-sm font-bold bg-blue-100 text-blue-700 border border-blue-200 capitalize shadow-xs">
            --
          </span>
        </div>
      </div>
    </section>

    <!-- TAB 2: RSS Feed Analyzer -->
    <section id="tabFeed" class="hidden space-y-6">
      <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
        <label for="feedUrl" class="block text-sm font-semibold text-slate-700 mb-2 flex items-center gap-2">
          <i data-lucide="link" class="w-4 h-4 text-slate-400"></i> RSS Feed URL
        </label>
        <div class="flex gap-2">
          <input type="text" id="feedUrl" class="flex-1 p-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-slate-900 placeholder-slate-400 text-sm" placeholder="https://rss.nytimes.com/services/xml/rss/nyt/World.xml">
          <button onclick="parseFeed()" id="btnAnalyzeFeed" class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-5 py-3 rounded-lg text-sm flex items-center gap-2 shadow-sm transition whitespace-nowrap active:scale-95">
            <i data-lucide="search" class="w-4 h-4"></i> Fetch & Categorize
          </button>
        </div>

        <!-- Quick Presets -->
        <div class="mt-4 pt-4 border-t border-slate-100 flex items-center gap-2 flex-wrap">
          <span class="text-xs text-slate-400 font-medium">Quick Presets:</span>
          <button onclick="setPreset('https://rss.nytimes.com/services/xml/rss/nyt/World.xml')" class="text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 px-2.5 py-1 rounded-md transition">NYT World</button>
          <button onclick="setPreset('http://feeds.bbci.co.uk/news/technology/rss.xml')" class="text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 px-2.5 py-1 rounded-md transition">BBC Tech</button>
          <button onclick="setPreset('https://feeds.feedburner.com/TechCrunch/')" class="text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 px-2.5 py-1 rounded-md transition">TechCrunch</button>
        </div>
      </div>

      <!-- Feed Results Container -->
      <div id="feedResultsCard" class="hidden bg-white rounded-xl shadow-sm border border-slate-200 p-6">
        <div class="flex items-center justify-between mb-4 border-b border-slate-100 pb-3">
          <h3 class="text-sm font-semibold text-slate-800 flex items-center gap-2">
            <i data-lucide="layers" class="w-4 h-4 text-blue-600"></i> Classified Feed Articles
          </h3>
          <span id="articleCount" class="text-xs font-medium text-slate-500">0 Articles</span>
        </div>
        
        <div id="feedList" class="divide-y divide-slate-100">
          <!-- Populated dynamically -->
        </div>
      </div>
    </section>

  </main>

  <!-- Footer -->
  <footer class="bg-white border-t border-slate-200 py-4 mt-auto">
    <div class="max-w-5xl mx-auto px-4 text-center text-xs text-slate-400">
      Built with FastAPI, Scikit-Learn & Tailwind CSS · Hosted on Vercel
    </div>
  </footer>

  <!-- App Logic -->
  <script>
    // Initialize Lucide Icons
    lucide.createIcons();

    // Tab Switching Logic
    function switchTab(tab) {
      const textTab = document.getElementById('tabText');
      const feedTab = document.getElementById('tabFeed');
      const textBtn = document.getElementById('tabTextBtn');
      const feedBtn = document.getElementById('tabFeedBtn');

      if (tab === 'text') {
        textTab.classList.remove('hidden');
        feedTab.classList.add('hidden');
        textBtn.className = "flex-1 flex items-center justify-center gap-2 py-3 px-4 text-sm font-medium text-blue-600 tab-active rounded-lg transition-all duration-150";
        feedBtn.className = "flex-1 flex items-center justify-center gap-2 py-3 px-4 text-sm font-medium text-slate-500 hover:text-slate-700 rounded-lg transition-all duration-150";
      } else {
        textTab.classList.add('hidden');
        feedTab.classList.remove('hidden');
        feedBtn.className = "flex-1 flex items-center justify-center gap-2 py-3 px-4 text-sm font-medium text-blue-600 tab-active rounded-lg transition-all duration-150";
        textBtn.className = "flex-1 flex items-center justify-center gap-2 py-3 px-4 text-sm font-medium text-slate-500 hover:text-slate-700 rounded-lg transition-all duration-150";
      }
    }

    function clearText() {
      document.getElementById('newsText').value = '';
      document.getElementById('textResultCard').classList.add('hidden');
    }

    function setPreset(url) {
      document.getElementById('feedUrl').value = url;
      parseFeed();
    }

    // Predict Single Text
    async function predictText() {
      const text = document.getElementById('newsText').value;
      const btn = document.getElementById('btnClassify');
      const resultCard = document.getElementById('textResultCard');
      const badge = document.getElementById('textBadge');

      if (!text.trim()) {
        alert("Please paste some text first.");
        return;
      }

      btn.disabled = true;
      btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Classifying...`;
      lucide.createIcons();

      try {
        const res = await fetch('/api/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });

        if (!res.ok) throw new Error('Prediction failed');

        const data = await res.json();
        badge.innerText = data.prediction;
        resultCard.classList.remove('hidden');
      } catch (err) {
        alert("Error predicting text category.");
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<i data-lucide="sparkles" class="w-4 h-4"></i> Classify Category`;
        lucide.createIcons();
      }
    }

    // Parse RSS Feed
    async function parseFeed() {
      const url = document.getElementById('feedUrl').value;
      const btn = document.getElementById('btnAnalyzeFeed');
      const resultsCard = document.getElementById('feedResultsCard');
      const feedList = document.getElementById('feedList');
      const articleCount = document.getElementById('articleCount');

      if (!url.trim()) {
        alert("Please enter a valid RSS Feed URL.");
        return;
      }

      btn.disabled = true;
      btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Analyzing...`;
      lucide.createIcons();

      try {
        const res = await fetch('/api/parse-feed', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });

        if (!res.ok) throw new Error('Feed parsing failed');

        const data = await res.json();
        
        articleCount.innerText = `${data.articles.length} Articles Found`;
        feedList.innerHTML = data.articles.map(article => `
          <div class="py-4 flex items-start justify-between gap-4 group">
            <div class="space-y-1">
              <a href="${article.link}" target="_blank" class="text-sm font-semibold text-slate-800 hover:text-blue-600 flex items-center gap-1.5 transition">
                ${article.title}
                <i data-lucide="external-link" class="w-3.5 h-3.5 text-slate-400 group-hover:text-blue-600 transition"></i>
              </a>
            </div>
            <span class="shrink-0 px-3 py-1 rounded-full text-xs font-semibold bg-slate-100 text-slate-700 border border-slate-200 capitalize">
              ${article.prediction}
            </span>
          </div>
        `).join('');

        resultsCard.classList.remove('hidden');
        lucide.createIcons();
      } catch (err) {
        alert("Failed to parse RSS feed. Make sure the feed URL is valid.");
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<i data-lucide="search" class="w-4 h-4"></i> Fetch & Categorize`;
        lucide.createIcons();
      }
    }
  </script>
</body>
</html>
