<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>News Reader Classifier</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; line-height: 1.6; background: #f8f9fa; color: #333; }
    h1 { color: #111; }
    .card { background: white; padding: 24px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 24px; }
    textarea, input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; margin-bottom: 12px; font-size: 14px; }
    button { background: #0070f3; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; }
    button:hover { background: #0051a2; }
    .result { margin-top: 16px; padding: 12px; background: #eef6ff; border-left: 4px solid #0070f3; border-radius: 4px; font-weight: 600; }
    .article-item { border-bottom: 1px solid #eee; padding: 12px 0; }
    .article-item:last-child { border-bottom: none; }
    .badge { display: inline-block; background: #0070f3; color: white; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; margin-left: 8px; }
  </style>
</head>
<body>

  <h1>📰 News Classifier</h1>

  <!-- Single Text Classification -->
  <div class="card">
    <h2>Classify Text</h2>
    <textarea id="newsText" rows="4" placeholder="Paste news article headline or text here..."></textarea>
    <button onclick="predictText()">Classify Category</button>
    <div id="textResult" style="display:none;" class="result"></div>
  </div>

  <!-- RSS Feed Classification -->
  <div class="card">
    <h2>Classify RSS Feed</h2>
    <input type="text" id="feedUrl" placeholder="https://rss.nytimes.com/services/xml/rss/nyt/World.xml" />
    <button onclick="parseFeed()">Analyze Feed</button>
    <div id="feedResults" style="margin-top: 16px;"></div>
  </div>

  <script>
    async function predictText() {
      const text = document.getElementById('newsText').value;
      const resultDiv = document.getElementById('textResult');
      if (!text.trim()) return alert("Please enter some text!");

      resultDiv.style.display = 'block';
      resultDiv.innerText = 'Analyzing...';

      try {
        const res = await fetch('/api/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        const data = await res.json();
        resultDiv.innerText = `Predicted Category: ${data.prediction}`;
      } catch (err) {
        resultDiv.innerText = 'Error processing request.';
      }
    }

    async function parseFeed() {
      const url = document.getElementById('feedUrl').value;
      const resultsDiv = document.getElementById('feedResults');
      if (!url.trim()) return alert("Please enter an RSS URL!");

      resultsDiv.innerHTML = '<p>Fetching and classifying feed...</p>';

      try {
        const res = await fetch('/api/parse-feed', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });
        const data = await res.json();
        
        resultsDiv.innerHTML = data.articles.map(a => `
          <div class="article-item">
            <a href="${a.link}" target="_blank">${a.title}</a>
            <span class="badge">${a.prediction}</span>
          </div>
        `).join('');
      } catch (err) {
        resultsDiv.innerHTML = '<p style="color:red;">Failed to process RSS feed.</p>';
      }
    }
  </script>
</body>
</html>
